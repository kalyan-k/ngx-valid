name: Test and build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate test and coverage reports
        run: npm run test:reports

      - name: Build library and demo application
        run: npm run build:all

      - name: Upload browsable test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-validation-test-reports
          path: reports/
          if-no-files-found: warn

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-validation-junit-results
          path: reports/**/junit/test-results.xml
          if-no-files-found: warn
