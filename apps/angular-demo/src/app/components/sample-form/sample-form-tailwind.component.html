<div class="tw-form-page demo-form-page">
  <form (ngSubmit)="onSubmit()" class="tw-form">
    <div class="tw-form-header">
      <policy-validation-group-status
        [model]="model"
        groupName="mainForm"
        pendingTooltip="Submit the form to evaluate all fields."
        evaluatedTooltip="Validation status for this Tailwind form group."
      ></policy-validation-group-status>
    </div>

    <policy-validation-summary [model]="model"></policy-validation-summary>
    <policy-validation-group-summary [model]="model" groupName="mainForm"></policy-validation-group-summary>

    <div class="tw-field" data-policy-validation-field>
      <label class="tw-label" for="twTextInput">Text Input</label>
      <input class="tw-input" type="text" id="twTextInput" name="textInput" [(ngModel)]="model.textInput"
        policyValidator [validateModel]="'form.textInput'" [actualModel]="model"
        [withPolicy]="'SampleForm'" groupName="mainForm" />
    </div>

    <div class="tw-field" data-policy-validation-field>
      <label class="tw-label" for="twEmailInput">Email</label>
      <input class="tw-input" type="email" id="twEmailInput" name="emailInput" [(ngModel)]="model.emailInput"
        policyValidator [validateModel]="'form.emailInput'" [actualModel]="model"
        [withPolicy]="'SampleForm'" groupName="mainForm" />
    </div>

    <div class="tw-field" data-policy-validation-field>
      <label class="tw-label" for="twPasswordInput">Password</label>
      <input class="tw-input" type="password" id="twPasswordInput" name="passwordInput" [(ngModel)]="model.passwordInput"
        policyValidator [validateModel]="'form.passwordInput'" [actualModel]="model"
        [withPolicy]="'SampleForm'" groupName="mainForm" />
      <p class="tw-hint">Minimum 8 characters</p>
    </div>

    <div class="tw-grid-2">
      <div class="tw-field" data-policy-validation-field>
        <label class="tw-label" for="twNumberInput">Number (1–100)</label>
        <input class="tw-input" type="number" id="twNumberInput" name="numberInput" [(ngModel)]="model.numberInput"
          policyValidator [validateModel]="'form.numberInput'" [actualModel]="model"
          [withPolicy]="'SampleForm'" groupName="mainForm" />
      </div>
      <div class="tw-field" data-policy-validation-field>
        <label class="tw-label" for="twDateInput">Date</label>
        <input class="tw-input" type="date" id="twDateInput" name="dateInput" [(ngModel)]="model.dateInput"
          policyValidator [validateModel]="'form.dateInput'" [actualModel]="model"
          [withPolicy]="'SampleForm'" groupName="mainForm" />
      </div>
    </div>

    <div class="tw-field tw-check" data-policy-validation-field>
      <input class="tw-checkbox" type="checkbox" id="twCheckboxInput" name="checkboxInput" [(ngModel)]="model.checkboxInput"
        policyValidator [validateModel]="'form.checkboxInput'" [actualModel]="model"
        [withPolicy]="'SampleForm'" groupName="mainForm" />
      <label class="tw-check-label" for="twCheckboxInput">I accept the terms and conditions</label>
    </div>

    <fieldset class="tw-fieldset" data-policy-validation-field policyValidator
      [validateModel]="'form.radioGroup'" [actualModel]="model"
      [withPolicy]="'SampleForm'" groupName="mainForm">
      <legend class="tw-label">Radio Group</legend>
      <label class="tw-radio"><input type="radio" name="radioGroup" value="option1" [(ngModel)]="model.radioGroup" /> Option 1</label>
      <label class="tw-radio"><input type="radio" name="radioGroup" value="option2" [(ngModel)]="model.radioGroup" /> Option 2</label>
    </fieldset>

    <div class="tw-field" data-policy-validation-field>
      <label class="tw-label" for="twSelectInput">Select</label>
      <select class="tw-input" id="twSelectInput" name="selectInput" [(ngModel)]="model.selectInput"
        policyValidator [validateModel]="'form.selectInput'" [actualModel]="model"
        [withPolicy]="'SampleForm'" groupName="mainForm">
        <option value="">Choose...</option>
        <option value="option1">Option 1</option>
        <option value="option2">Option 2</option>
        <option value="option3">Option 3</option>
      </select>
    </div>

    <div class="tw-field" data-policy-validation-field>
      <label class="tw-label" for="twTextareaInput">Textarea</label>
      <textarea class="tw-input tw-textarea" rows="4" id="twTextareaInput" name="textareaInput" [(ngModel)]="model.textareaInput"
        policyValidator [validateModel]="'form.textareaInput'" [actualModel]="model"
        [withPolicy]="'SampleForm'" groupName="mainForm"></textarea>
      <p class="tw-hint">Minimum 10 characters</p>
    </div>

    <div class="tw-actions">
      <button class="tw-btn tw-btn-primary" type="submit">Submit</button>
      <button class="tw-btn tw-btn-secondary" type="button" (click)="onClear()">Clear</button>
    </div>

    <div *ngIf="submitMessage" class="tw-alert" [class.tw-alert-error]="model.mainForm?.isInValid" [class.tw-alert-success]="model.mainForm?.isValid">
      {{ submitMessage }}
    </div>
  </form>
</div>
