<div *ngIf="visible" class="perf-error-summary" role="alert" aria-live="polite">
  <div class="perf-error-summary-header d-flex align-items-center flex-wrap gap-2">
    <button
      type="button"
      class="btn btn-sm btn-outline-danger perf-error-toggle"
      (click)="toggleSummaryCollapsed()"
      [attr.aria-expanded]="!summaryCollapsed"
      [attr.aria-label]="summaryCollapsed ? 'Expand error summary' : 'Collapse error summary'"
    >
      {{ summaryCollapsed ? '▶' : '▼' }}
    </button>
    <strong class="perf-error-summary-title">{{ title }}</strong>
    <span class="badge bg-danger">{{ totalErrorCount }}</span>
    <div class="d-flex flex-wrap gap-2 ms-auto" *ngIf="!summaryCollapsed">
      <button type="button" class="btn btn-sm btn-outline-secondary" (click)="collapseAllGroups()">
        Collapse all
      </button>
      <button type="button" class="btn btn-sm btn-outline-secondary" (click)="expandAllGroups()">
        Expand all
      </button>
    </div>
  </div>

  <div *ngIf="!summaryCollapsed" class="perf-error-summary-body">
    <div
      *ngFor="let group of groupedErrors; trackBy: trackGroup"
      class="perf-error-group"
    >
      <div class="perf-error-group-header d-flex align-items-center gap-2">
        <button
          type="button"
          class="btn btn-sm btn-outline-secondary perf-error-toggle"
          (click)="toggleGroup(group.sectionId)"
          [attr.aria-expanded]="!isGroupCollapsed(group.sectionId)"
          [attr.aria-label]="isGroupCollapsed(group.sectionId) ? 'Expand section errors' : 'Collapse section errors'"
        >
          {{ isGroupCollapsed(group.sectionId) ? '▶' : '▼' }}
        </button>
        <span class="fw-semibold">{{ group.title }}</span>
        <span class="badge bg-secondary">{{ group.errors.length }}</span>
      </div>
      <ul *ngIf="!isGroupCollapsed(group.sectionId)" class="perf-error-group-list mb-0">
        <li *ngFor="let err of group.errors">{{ err.error.message }}</li>
      </ul>
    </div>
  </div>
</div>
