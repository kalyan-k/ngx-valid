<div class="tw-form-page demo-form-page">
  <form (ngSubmit)="onSubmit()" class="tw-form">
    <section class="tw-panel tw-panel-highlight mb-4">
      <policy-validation-policy-group-status
        [model]="model"
        policyGroupName="checkout"
        label="Entire page (checkout policy group)"
        pendingTooltip="Validates all three policies together on submit."
        evaluatedTooltip="Combined result across all form sections."
      ></policy-validation-policy-group-status>
      <policy-validation-policy-group-summary [model]="model" policyGroupName="checkout"></policy-validation-policy-group-summary>
      <policy-validation-summary [model]="model" title="All errors on this page:"></policy-validation-summary>
    </section>

    <section class="tw-panel mb-4">
      <header class="tw-panel-header">
        <div>
          <h3 class="tw-panel-title">Personal Information</h3>
          <p class="tw-panel-subtitle">Policy: PersonalInfo · Group: personalInfo</p>
        </div>
        <policy-validation-group-status
          [model]="model"
          groupName="personalInfo"
          pendingTooltip="All personal fields are always required."
          evaluatedTooltip="Valid when name, email, and phone pass validation."
        ></policy-validation-group-status>
      </header>
      <policy-validation-group-summary [model]="model" groupName="personalInfo"></policy-validation-group-summary>
      <div class="tw-grid-2">
        <div class="tw-field" data-policy-validation-field>
          <label class="tw-label" for="twFirstName">First Name</label>
          <input class="tw-input" type="text" id="twFirstName" name="firstName" [(ngModel)]="model.personal.firstName"
            policyValidator [validateModel]="'form.personal.firstName'" [actualModel]="model"
            [withPolicy]="'PersonalInfo'" groupName="personalInfo" />
        </div>
        <div class="tw-field" data-policy-validation-field>
          <label class="tw-label" for="twLastName">Last Name</label>
          <input class="tw-input" type="text" id="twLastName" name="lastName" [(ngModel)]="model.personal.lastName"
            policyValidator [validateModel]="'form.personal.lastName'" [actualModel]="model"
            [withPolicy]="'PersonalInfo'" groupName="personalInfo" />
        </div>
        <div class="tw-field" data-policy-validation-field>
          <label class="tw-label" for="twPersonalEmail">Email</label>
          <input class="tw-input" type="email" id="twPersonalEmail" name="personalEmail" [(ngModel)]="model.personal.email"
            policyValidator [validateModel]="'form.personal.email'" [actualModel]="model"
            [withPolicy]="'PersonalInfo'" groupName="personalInfo" />
        </div>
        <div class="tw-field" data-policy-validation-field>
          <label class="tw-label" for="twPhone">Phone</label>
          <input class="tw-input" type="tel" id="twPhone" name="phone" placeholder="(555) 555-5555" [(ngModel)]="model.personal.phone"
            policyValidator [validateModel]="'form.personal.phone'" [actualModel]="model"
            [withPolicy]="'PersonalInfo'" groupName="personalInfo" />
        </div>
      </div>
    </section>

    <section class="tw-panel mb-4">
      <header class="tw-panel-header">
        <div>
          <h3 class="tw-panel-title">Shipping Address</h3>
          <p class="tw-panel-subtitle">Policy: ShippingAddress · Conditional rules</p>
        </div>
        <policy-validation-group-status
          [model]="model"
          groupName="shippingInfo"
          pendingTooltip="City, State, ZIP required when Street Address has a value."
          evaluatedTooltip="Valid when required shipping fields pass."
        ></policy-validation-group-status>
      </header>
      <policy-validation-group-summary [model]="model" groupName="shippingInfo"></policy-validation-group-summary>
      <div class="tw-field" data-policy-validation-field>
        <label class="tw-label" for="twShippingLine1">Street Address</label>
        <input class="tw-input" type="text" id="twShippingLine1" name="shippingLine1" [(ngModel)]="model.shipping.line1"
          policyValidator [validateModel]="'form.shipping.line1'" [actualModel]="model"
          [withPolicy]="'ShippingAddress'" groupName="shippingInfo" />
        <p class="tw-hint">Enter a street address to enable required city, state, ZIP, and country.</p>
      </div>
      <div class="tw-field">
        <label class="tw-label" for="twShippingLine2">Street Address 2 (optional)</label>
        <input class="tw-input" type="text" id="twShippingLine2" name="shippingLine2" [(ngModel)]="model.shipping.line2" />
      </div>
      <div class="tw-grid-3">
        <div class="tw-field" data-policy-validation-field>
          <label class="tw-label" for="twShippingCity">City</label>
          <input class="tw-input" type="text" id="twShippingCity" name="shippingCity" [(ngModel)]="model.shipping.city"
            policyValidator [validateModel]="'form.shipping.city'" [actualModel]="model"
            [withPolicy]="'ShippingAddress'" groupName="shippingInfo" />
        </div>
        <div class="tw-field" data-policy-validation-field>
          <label class="tw-label" for="twShippingState">State</label>
          <input class="tw-input" type="text" id="twShippingState" name="shippingState" [(ngModel)]="model.shipping.state"
            policyValidator [validateModel]="'form.shipping.state'" [actualModel]="model"
            [withPolicy]="'ShippingAddress'" groupName="shippingInfo" />
        </div>
        <div class="tw-field" data-policy-validation-field>
          <label class="tw-label" for="twShippingZip">ZIP Code</label>
          <input class="tw-input" type="text" id="twShippingZip" name="shippingZip" [(ngModel)]="model.shipping.zip"
            policyValidator [validateModel]="'form.shipping.zip'" [actualModel]="model"
            [withPolicy]="'ShippingAddress'" groupName="shippingInfo" />
        </div>
      </div>
      <div class="tw-field" data-policy-validation-field>
        <label class="tw-label" for="twShippingCountry">Country</label>
        <select class="tw-input" id="twShippingCountry" name="shippingCountry" [(ngModel)]="model.shipping.country"
          policyValidator [validateModel]="'form.shipping.country'" [actualModel]="model"
          [withPolicy]="'ShippingAddress'" groupName="shippingInfo">
          <option value="">Choose...</option>
          <option value="US">United States</option>
          <option value="CA">Canada</option>
        </select>
      </div>
    </section>

    <section class="tw-panel mb-4">
      <header class="tw-panel-header">
        <div>
          <h3 class="tw-panel-title">Billing Address</h3>
          <p class="tw-panel-subtitle">Policy: BillingAddress · Depends on same-as-shipping</p>
        </div>
        <policy-validation-group-status
          [model]="model"
          groupName="billingInfo"
          pendingTooltip="Billing fields required when 'Same as shipping' is unchecked."
          evaluatedTooltip="Valid when billing rules pass."
        ></policy-validation-group-status>
      </header>
      <policy-validation-group-summary [model]="model" groupName="billingInfo"></policy-validation-group-summary>
      <div class="tw-field tw-check">
        <input class="tw-checkbox" type="checkbox" id="twSameAsShipping" name="sameAsShipping"
          [(ngModel)]="model.billing.sameAsShipping" (ngModelChange)="onSameAsShippingChange()" />
        <label class="tw-check-label" for="twSameAsShipping">Same as shipping address</label>
      </div>

      <div *ngIf="!model.billing.sameAsShipping">
        <div class="tw-field" data-policy-validation-field>
          <label class="tw-label" for="twBillingLine1">Street Address</label>
          <input class="tw-input" type="text" id="twBillingLine1" name="billingLine1" [(ngModel)]="model.billing.line1"
            policyValidator [validateModel]="'form.billing.line1'" [actualModel]="model"
            [withPolicy]="'BillingAddress'" groupName="billingInfo" />
        </div>
        <div class="tw-grid-2">
          <div class="tw-field" data-policy-validation-field>
            <label class="tw-label" for="twBillingCity">City</label>
            <input class="tw-input" type="text" id="twBillingCity" name="billingCity" [(ngModel)]="model.billing.city"
              policyValidator [validateModel]="'form.billing.city'" [actualModel]="model"
              [withPolicy]="'BillingAddress'" groupName="billingInfo" />
          </div>
          <div class="tw-field" data-policy-validation-field>
            <label class="tw-label" for="twBillingZip">ZIP Code</label>
            <input class="tw-input" type="text" id="twBillingZip" name="billingZip" [(ngModel)]="model.billing.zip"
              policyValidator [validateModel]="'form.billing.zip'" [actualModel]="model"
              [withPolicy]="'BillingAddress'" groupName="billingInfo" />
          </div>
        </div>
      </div>
    </section>

    <div class="tw-actions">
      <button class="tw-btn tw-btn-primary" type="submit">Submit All Forms</button>
      <button class="tw-btn tw-btn-secondary" type="button" (click)="onClear()">Clear</button>
    </div>

    <div *ngIf="submitMessage" class="tw-alert" [class.tw-alert-error]="model.checkout?.isInValid" [class.tw-alert-success]="model.checkout?.isValid">
      {{ submitMessage }}
    </div>
  </form>
</div>
