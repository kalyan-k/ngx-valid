<div class="vr-demo-shell">
  <aside class="vr-demo-sidebar">
    <header class="vr-demo-sidebar__intro">
      <p class="vr-demo-sidebar__eyebrow">Angular demo</p>
      <h2>Forms showcase</h2>
      <p>Compare one validation policy across Bootstrap, Angular Material, and Tailwind-compatible presentation.</p>
    </header>

    <nav class="vr-demo-nav" aria-label="Angular demo navigation">
      <a class="vr-demo-nav__link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <p class="vr-demo-nav__section">Demos</p>
      <div class="vr-demo-nav__group">
        <button type="button" class="vr-demo-nav__toggle" (click)="isFrameworksExpanded = !isFrameworksExpanded" [attr.aria-expanded]="isFrameworksExpanded">UI frameworks</button>
        <div *ngIf="isFrameworksExpanded" class="vr-demo-nav__children">
          <a *ngFor="let framework of frameworks" class="vr-demo-nav__link" [routerLink]="'/demos/' + framework.id" routerLinkActive="active">{{ framework.label }}</a>
        </div>
      </div>
    </nav>

    <footer class="vr-demo-sidebar__footer">
      <a [href]="docsUrl">Read Angular documentation →</a>
      <span>Policy-based validation for Angular forms · © {{ currentYear }}</span>
    </footer>
  </aside>

  <main class="vr-demo-main"><router-outlet></router-outlet></main>
</div>
