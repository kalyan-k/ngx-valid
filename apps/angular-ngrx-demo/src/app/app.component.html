<validation-platform-shell active-application="angular-ngrx-demo" application-name="Angular + NgRx Demo" version="0.0.0">
<div class="vr-demo-shell">
  <aside class="vr-demo-sidebar">
    <header class="vr-demo-sidebar__intro">
      <p class="vr-demo-sidebar__eyebrow">Angular + NgRx</p>
      <h2>State integration</h2>
      <p>Compare store-only validation with an enterprise Reactive Forms synchronization lifecycle.</p>
    </header>

    <nav class="vr-demo-nav" aria-label="Angular NgRx demo navigation">
      <a class="vr-demo-nav__link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <p class="vr-demo-nav__section">Demos</p>
      <div class="vr-demo-nav__group">
        <button type="button" class="vr-demo-nav__toggle" (click)="isExamplesExpanded = !isExamplesExpanded" [attr.aria-expanded]="isExamplesExpanded">Integration patterns</button>
        <div *ngIf="isExamplesExpanded" class="vr-demo-nav__children">
          <a class="vr-demo-nav__link" routerLink="/state" routerLinkActive="active">Pure NgRx State</a>
          <a class="vr-demo-nav__link" routerLink="/reactive-forms" routerLinkActive="active">NgRx + Reactive Forms</a>
        </div>
      </div>
    </nav>

    <footer class="vr-demo-sidebar__footer">
      <a [href]="links.docs">Read the NgRx guide →</a>
      <span>State-driven Angular validation · © {{ currentYear }}</span>
    </footer>
  </aside>
  <main class="vr-demo-main"><router-outlet></router-outlet></main>
  </div>
</validation-platform-shell>
