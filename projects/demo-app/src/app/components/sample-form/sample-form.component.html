<div class="container py-4">
  <h2>Sample Form — All HTML Controls</h2>
  <p class="text-muted">Single form demonstrating ngx-valid with Bootstrap styling and policy-based rules.</p>

  <form (ngSubmit)="onSubmit()" #sampleForm="ngForm">
    <ngx-validation-summary *ngIf="showSummary" [model]="model"></ngx-validation-summary>

    <div class="form-group mb-3" data-ngx-valid-field>
      <label for="textInput">Text Input</label>
      <input
        type="text"
        class="form-control"
        id="textInput"
        name="textInput"
        [(ngModel)]="model.textInput"
        ngxValidator
        [validateModel]="'form.textInput'"
        [actualModel]="model"
        [withPolicy]="'SampleForm'"
        groupName="mainForm"
      />
    </div>

    <div class="form-group mb-3" data-ngx-valid-field>
      <label for="emailInput">Email Input</label>
      <input
        type="email"
        class="form-control"
        id="emailInput"
        name="emailInput"
        [(ngModel)]="model.emailInput"
        ngxValidator
        [validateModel]="'form.emailInput'"
        [actualModel]="model"
        [withPolicy]="'SampleForm'"
        groupName="mainForm"
      />
    </div>

    <div class="form-group mb-3" data-ngx-valid-field>
      <label for="passwordInput">Password Input</label>
      <input
        type="password"
        class="form-control"
        id="passwordInput"
        name="passwordInput"
        [(ngModel)]="model.passwordInput"
        ngxValidator
        [validateModel]="'form.passwordInput'"
        [actualModel]="model"
        [withPolicy]="'SampleForm'"
        groupName="mainForm"
      />
    </div>

    <div class="form-group mb-3" data-ngx-valid-field>
      <label for="numberInput">Number Input (1–100)</label>
      <input
        type="number"
        class="form-control"
        id="numberInput"
        name="numberInput"
        [(ngModel)]="model.numberInput"
        ngxValidator
        [validateModel]="'form.numberInput'"
        [actualModel]="model"
        [withPolicy]="'SampleForm'"
        groupName="mainForm"
      />
    </div>

    <div class="form-group mb-3" data-ngx-valid-field>
      <label for="dateInput">Date Input</label>
      <input
        type="date"
        class="form-control"
        id="dateInput"
        name="dateInput"
        [(ngModel)]="model.dateInput"
        ngxValidator
        [validateModel]="'form.dateInput'"
        [actualModel]="model"
        [withPolicy]="'SampleForm'"
        groupName="mainForm"
      />
    </div>

    <div class="form-check mb-3" data-ngx-valid-field>
      <input
        type="checkbox"
        class="form-check-input"
        id="checkboxInput"
        name="checkboxInput"
        [(ngModel)]="model.checkboxInput"
        ngxValidator
        [validateModel]="'form.checkboxInput'"
        [actualModel]="model"
        [withPolicy]="'SampleForm'"
        groupName="mainForm"
        validateOnEvent="change"
      />
      <label class="form-check-label" for="checkboxInput">I accept the terms and conditions</label>
    </div>

    <fieldset class="mb-3" data-ngx-valid-field>
      <legend class="form-label">Radio Group</legend>
      <div class="form-check">
        <input
          type="radio"
          class="form-check-input"
          id="radioInput1"
          name="radioGroup"
          value="option1"
          [(ngModel)]="model.radioGroup"
          ngxValidator
          [validateModel]="'form.radioGroup'"
          [actualModel]="model"
          [withPolicy]="'SampleForm'"
          groupName="mainForm"
        />
        <label class="form-check-label" for="radioInput1">Option 1</label>
      </div>
      <div class="form-check">
        <input
          type="radio"
          class="form-check-input"
          id="radioInput2"
          name="radioGroup"
          value="option2"
          [(ngModel)]="model.radioGroup"
        />
        <label class="form-check-label" for="radioInput2">Option 2</label>
      </div>
    </fieldset>

    <div class="form-group mb-3" data-ngx-valid-field>
      <label for="selectInput">Select</label>
      <select
        class="form-control"
        id="selectInput"
        name="selectInput"
        [(ngModel)]="model.selectInput"
        ngxValidator
        [validateModel]="'form.selectInput'"
        [actualModel]="model"
        [withPolicy]="'SampleForm'"
        groupName="mainForm"
      >
        <option value="">Choose...</option>
        <option value="option1">Option 1</option>
        <option value="option2">Option 2</option>
        <option value="option3">Option 3</option>
      </select>
    </div>

    <div class="form-group mb-3" data-ngx-valid-field>
      <label for="textareaInput">Textarea</label>
      <textarea
        class="form-control"
        id="textareaInput"
        name="textareaInput"
        rows="4"
        [(ngModel)]="model.textareaInput"
        ngxValidator
        [validateModel]="'form.textareaInput'"
        [actualModel]="model"
        [withPolicy]="'SampleForm'"
        groupName="mainForm"
      ></textarea>
    </div>

    <div class="d-flex align-items-center gap-3 mt-3">
      <button type="submit" class="btn btn-primary">Submit</button>
      <button type="button" class="btn btn-outline-secondary" (click)="onClear()">Clear</button>
      <span *ngIf="model.mainForm" [class.text-danger]="model.mainForm.isInValid" [class.text-success]="model.mainForm.isValid">
        Form status: {{ model.mainForm.isValid ? 'Valid' : 'Invalid' }}
      </span>
    </div>

    <div *ngIf="submitMessage" class="alert mt-3" [class.alert-danger]="model.mainForm?.isInValid" [class.alert-success]="model.mainForm?.isValid">
      {{ submitMessage }}
    </div>
  </form>
</div>
