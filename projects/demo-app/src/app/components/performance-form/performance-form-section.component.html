<div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
  <div class="d-flex align-items-center gap-2 flex-wrap flex-grow-1">
    <button
      type="button"
      class="btn btn-sm btn-outline-secondary perf-section-toggle"
      (click)="toggleCollapsed()"
      [attr.aria-expanded]="!collapsed"
      [attr.aria-label]="collapsed ? 'Expand section' : 'Collapse section'"
    >
      {{ collapsed ? '▶' : '▼' }}
    </button>
    <div>
      <h5 class="mb-0">{{ section.title }}</h5>
      <small class="text-muted">
        Policy: <code>{{ section.policyName }}</code> ·
        Group: <code>{{ section.groupName }}</code> ·
        {{ section.fields.length }} controls
        <span *ngIf="visibleFields.length < section.fields.length" class="text-primary">
          (rendering {{ visibleFields.length }}/{{ section.fields.length }})
        </span>
      </small>
    </div>
  </div>
  <div class="d-flex flex-wrap gap-2 align-items-center">
    <button
      type="button"
      class="btn btn-sm btn-outline-secondary"
      (click)="onFillSection()"
      [disabled]="!canUseSectionActions"
    >
      Fill section
    </button>
    <button
      type="button"
      class="btn btn-sm btn-outline-primary"
      (click)="onValidateSection()"
      [disabled]="!canUseSectionActions"
    >
      Validate section
    </button>
    <ngx-validation-group-status
      [model]="model"
      [groupName]="section.groupName"
      pendingTooltip="Section fields validate on blur/change; badge updates after submit or validate all."
      evaluatedTooltip="All controls in this section pass validation."
    ></ngx-validation-group-status>
  </div>
</div>
<div class="card-body" *ngIf="!collapsed">
  <ngx-validation-group-summary [model]="model" [groupName]="section.groupName"></ngx-validation-group-summary>

  <div class="row">
    <ng-container *ngFor="let field of visibleFields; trackBy: trackField">
      <div
        *ngIf="field.type === 'text' || field.type === 'email' || field.type === 'number' || field.type === 'date'"
        class="col-md-6 form-group mb-3"
        data-ngx-valid-field
      >
        <label [for]="field.elementId">{{ field.label }}</label>
        <input
          [type]="field.type"
          class="form-control"
          [id]="field.elementId"
          [name]="field.elementId"
          [(ngModel)]="model.sections[section.id][field.id]"
          ngxValidator
          [validateModel]="field.validateModel"
          [actualModel]="model"
          [withPolicy]="field.policyName"
          [groupName]="field.groupName"
        />
      </div>

      <div *ngIf="field.type === 'checkbox'" class="col-md-6 form-check mb-3" data-ngx-valid-field>
        <input
          type="checkbox"
          class="form-check-input"
          [id]="field.elementId"
          [name]="field.elementId"
          [(ngModel)]="model.sections[section.id][field.id]"
          ngxValidator
          [validateModel]="field.validateModel"
          [actualModel]="model"
          [withPolicy]="field.policyName"
          [groupName]="field.groupName"
        />
        <label class="form-check-label" [for]="field.elementId">{{ field.label }}</label>
      </div>

      <div *ngIf="field.type === 'select'" class="col-md-6 form-group mb-3" data-ngx-valid-field>
        <label [for]="field.elementId">{{ field.label }}</label>
        <select
          class="form-control"
          [id]="field.elementId"
          [name]="field.elementId"
          [(ngModel)]="model.sections[section.id][field.id]"
          ngxValidator
          [validateModel]="field.validateModel"
          [actualModel]="model"
          [withPolicy]="field.policyName"
          [groupName]="field.groupName"
        >
          <option value="">— Select —</option>
          <option *ngFor="let opt of field.selectOptions" [value]="opt">{{ opt }}</option>
        </select>
      </div>

      <div *ngIf="field.type === 'textarea'" class="col-md-12 form-group mb-3" data-ngx-valid-field>
        <label [for]="field.elementId">{{ field.label }}</label>
        <textarea
          class="form-control"
          rows="2"
          [id]="field.elementId"
          [name]="field.elementId"
          [(ngModel)]="model.sections[section.id][field.id]"
          ngxValidator
          [validateModel]="field.validateModel"
          [actualModel]="model"
          [withPolicy]="field.policyName"
          [groupName]="field.groupName"
        ></textarea>
        <small *ngIf="field.dependsOn" class="text-muted">Required when the section's anchor text field has a value.</small>
      </div>

      <fieldset
        *ngIf="field.type === 'radio'"
        class="col-md-6 mb-3 perf-radio-fieldset"
        data-ngx-valid-field
        ngxValidator
        [validateModel]="field.validateModel"
        [actualModel]="model"
        [withPolicy]="field.policyName"
        [groupName]="field.groupName"
      >
        <legend class="form-label fs-6">{{ field.label }}</legend>
        <div class="form-check" *ngFor="let opt of field.radioOptions">
          <input
            type="radio"
            class="form-check-input"
            [id]="field.elementId + '_' + opt.value"
            [name]="field.elementId"
            [value]="opt.value"
            [(ngModel)]="model.sections[section.id][field.id]"
          />
          <label class="form-check-label" [for]="field.elementId + '_' + opt.value">{{ opt.label }}</label>
        </div>
      </fieldset>
    </ng-container>
  </div>
</div>
